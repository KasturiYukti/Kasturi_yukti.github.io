<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasturi Yukti</title>

    <style>
        body {
            margin: 0;
            background: #0d1117;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 700px;
            padding: 20px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2rem;
            color: #b3b3b3;
        }

        .quote {
            margin-top: 30px;
            font-style: italic;
            color: #58a6ff;
        }

        button {
            margin-top: 30px;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            background: white;
            color: black;
            font-size: 1rem;
            cursor: pointer;
        }

        button:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Kasturi Yukti</h1>

        <p>
            A place for questions, ideas, learning and exploration.
        </p>

        <div class="quote">
            "For the questions that refuse to stay unanswered."
        </div>

        <button onclick="alert('Welcome to Kasturi Yukti')">
            Explore
        </button>
    </div>
</body>
</html>
